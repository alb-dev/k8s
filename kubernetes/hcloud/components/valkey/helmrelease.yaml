---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ${APP}-valkey
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${APP}-valkey
spec:
  chartRef:
    kind: OCIRepository
    name: ${APP}-valkey
  interval: 15m
  values:
    controllers:
      redis:
        pod:
          labels:
            app.kubernetes.io/component: ${APP}-valkey
          
          securityContext:
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
        containers:
          redis:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.0.3
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          redis:
            redis:
              - path: /data
                subPath: data
              - path: /tmp
                subPath: tmp
    service:
      forgejo-redis:
        ports:
          redis:
            port: 6379