---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo
  values:
    strategy:
      type: 'Recreate'
      
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
#        cert-manager.io/private-key-rotation-policy: Always
#        cert-manager.io/private-key-algorithm: ECDSA
#        cert-manager.io/private-key-size: 384
#        traefik.ingress.kubernetes.io/router.middlewares: "network-traefik-middleware-chain-forgejo@kubernetescrd"
        
#      tls:
#        - hosts:
#            - code.onji.space
#            - code.albdev.cloud
#          secretName: forgejo-tls
      hosts:
        - host: code.albdev.cloud
          paths:
            - path: /
              pathType: Prefix
              port: anubis
    httpRoute:
      enabled: true
      hostnames: [ "code.${CLUSTER_DOMAIN}" ]
      parentRefs:
        - name: external
          namespace: network
          sectionName: https
    service:
      ssh:
        ipFamilyPolicy: SingleStack # todo: remove after apply
      http:
        extraPorts:
          - name: anubis
            port: 8080
            targetPort: anubis
    persistence:
      enabled: true
      create: false
      claimName: forgejo-code-local
      storageClass: openebs-hostpath


    extraVolumes:
      - name: anubis-bot-policy
        configMap:
          name: anubis-bot-policy
          defaultMode: 0555

    gitea:
      admin:
        existingSecret: gitea-admin-secret
        passwordMode: keepUpdated
      ssh:
        logLevel: INFO
      config:
        log:
          MODE: console, file
          LEVEL: 'info'
          ACCESS: file 
        log.file:
          LEVEL: Debug
        server:
          ROOT_URL: https://code.albdev.cloud
          DOMAIN: code.albdev.cloud
          SSH_DOMAIN: code.albdev.cloud
          LFS_START_SERVER: true
          OFFLINE_MODE: true
          LANDING_PAGE: login
          MINIMUM_KEY_SIZE_CHECK: true

        repository:
          ROOT: /data/git/repositories
        lfs:
          PATH: /data/git/lfs
        service:
          DEFAULT_KEEP_EMAIL_PRIVATE: true
          ENABLE_NOTIFY_MAIL: true
          ALLOW_ONLY_EXTERNAL_REGISTRATION: false
          DEFAULT_ALLOW_CREATE_ORGANIZATION: false
          MAX_CREATION_LIMIT: 100
          DISABLE_REGISTRATION: true
        admin:
          SEND_NOTIFICATION_EMAIL_ON_NEW_USER: true
        cron:
          ENABLED: true
        APP_NAME: 'This is the way'
        repository.pull-request:
          WORK_IN_PROGRESS_PREFIXES: 'WIP:,[WIP]:'
        mailer:
          ENABLED: true
          FROM: 'forgejo@onji.space'
          PROTOCOL: 'smtp+starttls'
          SMTP_ADDR: 'mx.onji.space'
          SMTP_PORT: '587'
        database:
          PATH: /data/gitea.db
          DB_TYPE: sqlite3
          SQLITE_JOURNAL_MODE: wal
        session:
          PROVIDER: db
        cache:
          ADAPTER: memory
        packages:
          LIMIT_SIZE_CONTAINER: '2 GiB'
        oauth2_client:
          UPDATE_AVATAR: true
        queue:
          TYPE: level
        cron.archive_cleanup:
          SCHEDULE: '@hourly'
          OLDER_THAN: '2h'
        security:
          REVERSE_PROXY_TRUSTED_PROXIES: 127.0.0.0/8,::1/128,10.42.0.0/16,fd01::/48
      livenessProbe:
        tcpSocket: ~
        httpGet:
          path: /api/healthz
          port: http
        initialDelaySeconds: 30 # default is 200
        periodSeconds: 30
        successThreshold: 1
        failureThreshold: 10

    extraContainers:
      - name: anubis
        image: ghcr.io/techarohq/anubis:v1.23.1
        imagePullPolicy: Always
        env:
          - name: 'BIND'
            value: ':8080'
          - name: 'DIFFICULTY'
            value: '4'
    #      - name: ED25519_PRIVATE_KEY_HEX
    #        valueFrom:
    #          secretKeyRef:
    #            name: anubis-key-forgejo
    #            key: ED25519_PRIVATE_KEY_HEX
          - name: 'TARGET'
            value: 'http://localhost:3000'
          - name: 'POLICY_FNAME'
            value: '/etc/anubisBotPolicy.json'
        volumeMounts:
          - name: anubis-bot-policy
            mountPath: /etc/anubisBotPolicy.json
            subPath: anubisBotPolicy.json
            readOnly: true
        ports:
          - name: anubis
            containerPort: 8080
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault