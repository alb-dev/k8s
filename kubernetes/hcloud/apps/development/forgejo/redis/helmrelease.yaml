---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-redis
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo-redis
  interval: 15m
  values:
    controllers:
      redis:
        pod:
          labels:
            app.kubernetes.io/component: redis
          securityContext:
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
        containers:
          redis:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.0.3
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          redis:
            redis:
              - path: /data
                subPath: data
              - path: /tmp
                subPath: tmp
    service:
      forgejo-redis:
        ports:
          redis:
            port: 6379