---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: databases
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: openebs-hostpath
      volumeMode: Filesystem
  postgresql:
    parameters:
      archive_timeout: "30min"  # Reduce WAL generation on idle database (default was 5min)
      wal_keep_size: "128MB"    # Keep less WAL for replicas (down from 512MB)
  managed:
    roles:
      - name: nextcloud-next
        login: true
        superuser: false
        createdb: false
        passwordSecret:
          name: nextcloud-next-db-owner