---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dragonfly-operator
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: dragonfly-operator
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: dragonfly-operator
      namespace: databases
  interval: 1h
  path: "./kubernetes/hcloud/apps/databases/dragonfly-operator/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: databases
  timeout: 5m
  wait: false