---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: *app
      version: 37.1.2
      sourceRef:
        kind: HelmRepository
        name: traefik-charts
        namespace: flux-system
      interval: 30m
  values:
    deployment:
      kind: Deployment
      replicas: 1
    updateStrategy:
      type: Recreate
    image:
      registry: ghcr.io
      repository: traefik/traefik
      tag: v3.5.6@sha256:c460044fcb4ccca50e6e5ece81ef64a47cb24b16b8fbe4b1f699a90429e72119
    hostNetwork: true
    tlsStore:
      default:
        defaultCertificate:
          secretName: onji-space-production-dns-tls
    service:
      type: ClusterIP
    logs:
      access:
        enabled: true
        fields:
          headers:
            names:
              User-Agent: keep
    ingressClass:
      enabled: true
      isDefaultClass: true
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        enabled: true
        allowExternalNameServices: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
        allowExternalNameServices: true
        allowCrossNamespace: true
        ingressClass: traefik
    globalArguments:
      - --api.insecure=true
      - --serverstransport.insecureskipverify
    global:
      checkNewVersion: false
      sendAnonymousUsage: false
    env:
      - name: TZ
        value: Europe/Berlin
    ports:
      traefik:
        expose:
          default: false
      web:
        port: 80
      websecure:
        port: 443
        tls:
          enabled: true
          options: "default"
        transport:
          respondingTimeouts:
            readTimeout: 3600s
            idleTimeout: 3600s
            writeTimeout: 3600s
        http3:
          enabled: false
      metrics:
        # -- When using hostNetwork, use another port to avoid conflict with node exporter:
        port: 8082
    metrics:
      prometheus:
        serviceMonitor:
          enabled: true
    tlsOptions:
      default:
        minVersion: VersionTLS13
        maxVersion: VersionTLS13
        sniStrict: true
    pilot:
      enabled: false
    resources:
      requests:
        memory: 110Mi
        cpu: 500m
      limits:
        memory: 750Mi
    securityContext:
      capabilities:
        drop: [ALL]
        add: [NET_BIND_SERVICE]
      readOnlyRootFilesystem: true
      runAsGroup: 0
      runAsNonRoot: false
      runAsUser: 0