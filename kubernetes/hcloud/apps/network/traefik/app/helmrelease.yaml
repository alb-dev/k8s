---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  chartRef:
    kind: OCIRepository
    name: traefik
  interval: 30m
  values:
    deployment:
      kind: Deployment
      replicas: 1
    updateStrategy:
      type: Recreate
    image:
      registry: ghcr.io
      repository: traefik/traefik
      tag: v3.6.5@sha256:2979bff651c98e70345dd886186a7a15ee3ce18b636af208d4ccbf2d56dbdddd
    hostNetwork: true
    service:
      type: ClusterIP
    logs:
      access:
        enabled: true
        fields:
          headers:
            names:
              User-Agent: keep
    ingressClass:
      enabled: true
      isDefaultClass: true
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        enabled: true
        allowExternalNameServices: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
        allowExternalNameServices: true
        ingressClass: traefik
    globalArguments:
      - --api.insecure=true
      - --serverstransport.insecureskipverify
    global:
      checkNewVersion: false
      sendAnonymousUsage: false
    env:
      - name: TZ
        value: Europe/Berlin
    ports:
      traefik:
        expose:
          default: false
      web:
        port: 80
      websecure:
        port: 443
        tls:
          enabled: true
          options: "default"
        transport:
          respondingTimeouts:
            readTimeout: 3600s
            idleTimeout: 3600s
            writeTimeout: 3600s
        http:
          encodedCharacters:
            allowEncodedSlash: true
            allowEncodedBackSlash: false
            allowEncodedNullCharacter: false
            allowEncodedSemicolon: false
            allowEncodedPercent: false
            allowEncodedQuestionMark: true
            allowEncodedHash: false
        http3:
          enabled: true
      metrics:
        # -- When using hostNetwork, use another port to avoid conflict with node exporter:
        port: 8082
    metrics:
      prometheus:
        serviceMonitor:
          enabled: true
    tlsStore:
      default:
        certificates:
          - secretName: &default-certificate albdev-tls
        defaultCertificate:
          secretName: *default-certificate
    tlsOptions:
      default:
        minVersion: VersionTLS12
        maxVersion: VersionTLS13
        sniStrict: true
        preferServerCipherSuites: true
        cipherSuites:
          - TLS_ECDHE_ECDSA_WITH_RC4_128_SHA
          - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
          - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
          - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
          - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
          - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        curvePreferences:
          - X25519
          - CurveP521
          - CurveP384
          - CurveP256
    pilot:
      enabled: false
    resources:
      requests:
        memory: 110Mi
        cpu: 500m
      limits:
        memory: 750Mi
    securityContext:
      capabilities:
        drop: [ALL]
        add: [NET_BIND_SERVICE]
      readOnlyRootFilesystem: true
      runAsGroup: 0
      runAsNonRoot: false
      runAsUser: 0