---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: public-onji-tls
spec:
  secretName: public-onji-tls
  issuerRef:
    name: letsencrypt-production-dns
    kind: ClusterIssuer
  commonName: onji.space
  dnsNames:
    - onji.space
    - "*.onji.space"
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always