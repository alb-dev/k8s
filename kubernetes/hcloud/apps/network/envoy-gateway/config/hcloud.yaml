---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-hcloud
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 81
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: envoy-hcloud
spec:
  parentRefs:
    - name: envoy-hcloud
      namespace: network
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301