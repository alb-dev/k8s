---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  chartRef:
    kind: OCIRepository
    name: nextcloud
  interval: 15m
  values:
    deploymentAnnotations:
      secret.reloader.stakater.com/reload: nextcloud-secret
    image:
      repository: mirror.gcr.io/nextcloud
      tag: 33.0.3-fpm-alpine
      flavor: fpm-alpine
    httpRoute:
      enabled: true
      hostnames: ["files.${CLUSTER_DOMAIN}"]
      parentRefs:
        - name: envoy-external
          namespace: network
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: "/"
    nextcloud:
      host: files.albdev.cloud
      extraEnv:
        - name: REDIS_HOST
          value: nextcloud-redis
        - name: REDIS_DATABASE
          value: "2"
      existingSecret:
        enabled: true
        secretName: &secret nextcloud-secret
        usernameKey: nc-admin
        passwordKey: nc-admin-pw
      mail:
        enabled: true
        fromAddress: postmaster
        domain: "${SECRET_DOMAIN}"
        smtp:
          port: 2525
          secure: ''
      defaultConfigs:
        redis.config.php: false
      configs:
        local.config.php: |-
            <?php
            $CONFIG = array(
              'trusted_proxies' => array(
                '127.0.0.1',
                '10.0.0.0/8',
              ),
              'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
              'default_phone_region' => 'DE',
              'auth.bruteforce.protection.enabled' => true,
              'maintenance_window_start' => 1,
              'simpleSignUpLink.shown' => false,
              'overwrite.cli.url' => 'https://files.albdev.cloud',
            );
      phpConfigs:
        uploadLimit.ini: |
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
      hooks:
        post-installation: |-
          php occ maintenance:repair --include-expensive
          php occ db:add-missing-indices
          php occ db:add-missing-columns
          php occ db:add-missing-primary-keys
        before-starting: |-
          # disable unneceserry apps
          for appname in activity circles systemtags federation privacy \
              nextcloud_announcements announcementcenter support survey_client \
              user_status weather_status dashboard app_api
            do
            php occ app:disable "$appname"
          done
        post-upgrade: |-
          php occ maintenance:repair --include-expensive
          php occ db:add-missing-indices
          php occ db:add-missing-columns
          php occ db:add-missing-primary-keys
    collabora:
      enabled: false
    cronjob:
      enabled: true
      cronjob:
        schedule: "0 */4 * * *"
    persistence:
      enabled: true
      existingClaim: nextcloud-local
    nginx:
      enabled: true
      image:
        repository: public.ecr.aws/nginx/nginx
        tag: "1.30.0"
      config:
        default: true
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: *secret
        databaseKey: pg-db
        hostKey: pg-host
        passwordKey: pg-password
        usernameKey: pg-username
    redis:
      enabled: false
    metrics:
      enabled: false
      https: true
      serviceMonitor:
        enabled: false
