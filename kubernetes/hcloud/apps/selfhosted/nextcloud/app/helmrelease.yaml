---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: nextcloud
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 9.0.5
  url: oci://ghcr.io/nextcloud/helm/nextcloud
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  chartRef:
    kind: OCIRepository
    name: nextcloud
  interval: 1m
  values:
    cronjob:
      enabled: true
      type: cronjob

    externalRedis:
      enabled: true
      host: nextcloud-dragonfly
      port: 6379

    image:
      registry: docker.io
      repository: nextcloud
      tag: 33.0.3.1-fpm-alpine
      flavor: fpm-alpine

    nginx:
      enabled: true
      image:
        repository: mirror.gcr.io/library/nginx

    httpRoute:
      enabled: true
      hostnames: ["files.${CLUSTER_DOMAIN}"]
      parentRefs:
        - name: envoy-external
          namespace: network
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: "/"

    nextcloud:
      host: files.albdev.cloud
      existingSecret:
        enabled: true
        secretName: &secret nextcloud-secret
        usernameKey: nc-admin
        passwordKey: nc-admin-pw
      mail:
        enabled: true
        fromAddress: postmaster
        domain: "${SECRET_DOMAIN}"
        smtp:
          port: 2525
          secure: ''
      defaultConfigs:
        redis.config.php: false
      configs:
        local.config.php: |-
            <?php
            $CONFIG = array(
              'trusted_proxies' => array(
                '127.0.0.1',
                '10.0.0.0/8',
              ),
              'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
              'default_phone_region' => 'DE',
              'auth.bruteforce.protection.enabled' => true,
              'maintenance_window_start' => 1,
              'simpleSignUpLink.shown' => false,
              'overwrite.cli.url' => 'https://files.albdev.cloud',
            );
      phpConfigs:
        uploadLimit.ini: |
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
      hooks:
        post-installation: |-
          php occ maintenance:repair --include-expensive
          php occ db:add-missing-indices
          php occ db:add-missing-columns
          php occ db:add-missing-primary-keys
        before-starting: |-
          # disable unneceserry apps
          for appname in activity circles systemtags federation privacy \
              nextcloud_announcements announcementcenter support survey_client \
              user_status weather_status dashboard app_api
            do
            php occ app:disable "$appname"
          done
        post-upgrade: |-
          php occ maintenance:repair --include-expensive
          php occ db:add-missing-indices
          php occ db:add-missing-columns
          php occ db:add-missing-primary-keys

    persistence:
      enabled: true
      existingClaim: nextcloud-local

    externalDatabase:
      enabled: true
      type: postgresql
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: *secret
        databaseKey: pg-db
        hostKey: pg-host
        passwordKey: pg-password
        usernameKey: pg-username

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: nextcloud
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: nextcloud
              spec:
                template:
                  spec:
                    hostUsers: false