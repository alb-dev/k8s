---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: selfhosted-pg-cluster
  namespace: selfhosted
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5@sha256:b1deeed2aa998b2f381e39c5cadb9ec06127708c8bd62965743af19abf21628f
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      storageClassName: openebs-hostpath
      volumeMode: Filesystem
  postgresql:
    parameters:
      archive_timeout: "30min"  # Reduce WAL generation on idle database (default was 5min)
      wal_keep_size: "128MB"    # Keep less WAL for replicas (down from 512MB)
  managed:
    roles:
      - name: nextcloud
        login: true
        superuser: false
        createdb: true