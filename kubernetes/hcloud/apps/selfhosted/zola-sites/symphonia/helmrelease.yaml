---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: symphonia-linktree
spec:
  chartRef:
    kind: OCIRepository
    name: symphonia-linktree
  interval: 30m

  values:
    controllers:
      symphonia-linktree:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          hostUsers: false

        containers:
          app:
            image:
              repository: code.onji.space/lab/symphonia-linktree
              tag: 2025.11.6
            env:
              TZ: Europe/Berlin
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M

    service:
      app:
        ports:
          http:
            port: 80

    route:
      app:
        hostnames: ["symphonia.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
