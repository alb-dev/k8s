---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mel-site
spec:
  chartRef:
    kind: OCIRepository
    name: mel-site
  interval: 1h
  values:
    controllers:
      ghost:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: mirror.gcr.io/ghost
              tag: 6.12.0
            env:
              TZ: ${TIMEZONE}
              database__client: mysql
              database__connection__host: mel-db.selfhosted.svc.cluster.local
              database__connection__user: ghost
              database__connection__database: ghost
              NODE_ENV: production
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        
    service:
      app:
        ports:
          http:
            port: 2368

    route:
      app:
        hostnames:
          - "mel.albdev.cloud"
        parentRefs:
          - name: envoy-external
            namespace: envoy-gateway-system
            sectionName: https

      admin:
        hostnames:
          - "admin-mel.albdev.cloud"
        parentRefs:
          - name: envoy-external
            namespace: envoy-gateway-system
            sectionName: https

    persistence:
      content:
        globalMounts:
          - path: /var/lib/ghost/content
        existingClaim: mel-site
      tmp:
        type: emptyDir