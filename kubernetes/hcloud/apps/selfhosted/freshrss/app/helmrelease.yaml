---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: freshrss
spec:
  chartRef:
    kind: OCIRepository
    name: freshrss
  interval: 1h

  values:
    controllers:
      freshrss:
        replicas: 1
        strategy: RollingUpdate

        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          hostUsers: false

        containers:
          app:
            image:
              repository: mirror.gcr.io/freshrss/freshrss
              tag: 1.27.1-alpine@sha256:567abff05431f8ea798fa1c19e7ec82b5e66921192823723d92a00196a792d2e
            env:
              TZ: Europe/Berlin
              CRON_MIN: "*"
              DOMAIN: rss.albdev.cloud
              LISTEN: &port 8080
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["rss.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - filters:
            - type: RequestHeaderModifier
              requestHeaderModifier:
                set:
                  - name: X-Robots-tag
                    value: "noindex, nofollow"
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: freshrss
        advancedMounts:
          freshrss:
            app:
              - path: /var/www/FreshRSS/data
                subPath: data
                readOnly: false
              - path: /var/www/FreshRSS/extensions
                subPath: extensions
                readOnly: false