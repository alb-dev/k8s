---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: littlelink
spec:
  chartRef:
    kind: OCIRepository
    name: littlelink
  interval: 30m
  values:
    controllers:
      littlelink:
        replicas: 1
        strategy: RollingUpdate

        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            fsGroupChangePolicy: "OnRootMismatch"

        containers:
          app:
            image:
              repository: ghcr.io/techno-tim/littlelink-server
              tag: latest@sha256:e84ea9d93b60362cf9e292dba43adb604e375d9206d5fcf1de6bb766a20aabd1
            env:
              TZ: ${TIMEZONE}
              META_TITLE: Symphonia Costumes
              META_DESCRIPTION: Symphonia Costumes Link Page
              META_KEYWORDS: Devops
              META_AUTHOR: Symphonia Costumes
              META_LANG: en
              META_INDEX_STATUS: all
              OG_SITE_NAME: Symphonia Costumes Links
              OG_TITLE: Symphonia Costumes Links
              OG_DESCRIPTION: A collection of all of my relevant links
              OG_URL: https://symphonia.${SECRET_DOMAIN}
              AVATAR_URL: https://code.albdev.cloud/lab/CDN/raw/branch/main/452250584_460356603517477_1836607217631698383_n.jpg
              AVATAR_2X_URL: https://code.albdev.cloud/lab/CDN/raw/branch/main/452250584_460356603517477_1836607217631698383_n.jpg
              NAME: "Symphonia"
              THEME: Dark
              BIO: "Costume Artist | Wig Artist | Embroidery | Cosplay"
              BUTTON_ORDER: INSTAGRAM,BLUESKY,TIKTOK,Ko-Fi,EMAIL
              INSTAGRAM: https://www.instagram.com/symphoniacostumes
              BLUESKY: https://bsky.app/profile/stephcalation.bsky.social
              TIKTOK: https://www.tiktok.com/@symphoniacostumes
              Ko-Fi: https://ko-fi.com/symphoniacostumes
              EMAIL: symphonia@naoalb.org
              EMAIL_TEXT: Email me!
              FOOTER: Symphonia © 2025-Present
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 100Mi
    service:
      app:
        controller: littlelink
        ports:
          http:
            port: 3000

    ingress:
      app:
        className: traefik
        hosts:
          - host: "symphonia.albdev.cloud"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http