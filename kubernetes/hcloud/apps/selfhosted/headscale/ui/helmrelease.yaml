---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headplane
spec:
  chartRef:
    kind: OCIRepository
    name: headplane
  interval: 1h
  values:
    controllers:
      headscale-ui:
        replicas: 1
        strategy: RollingUpdate

        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/tale/headplane
              tag: 0.6.1

            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
            probes:
              liveness: &probe
                enabled: true
                type: HTTP
                path: /admin/healthz
              readiness: *probe
              startup:
                <<: *probe
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        ports:
          http:
            port: 3000
            
    ingress:
      app:
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          cert-manager.io/private-key-rotation-policy: Always
          cert-manager.io/private-key-algorithm: ECDSA
          cert-manager.io/private-key-size: "384"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        hosts:
          - host: "headscale.onji.space"
            paths:
              - path: /admin
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - "headscale.onji.space"
              - "headscale.albdev.cloud"
            secretName: headscale-tls
    route:
      app:
        hostnames:
          - headscale.albdev.cloud
          - headscale.onji.space
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /admin
            backendRefs:
              - identifier: app

    persistence:
      config:
        enabled: true
        type: secret
        name: headplane-config
        globalMounts:
          - path: /etc/headplane
      data:
        enabled: true
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 1Gi
        retain: true
        globalMounts:
          - path: /var/lib/headplane
      tmp:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp