---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arrs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: arrs
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: ${VOLSYNC_UID}
        runAsGroup: ${VOLSYNC_GID}
        fsGroup: ${VOLSYNC_GID}
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      arrs:   
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          labels:
            gluetun: "true"
          hostname: sabnzbd

        initContainers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41
            env:
              # Other options
              TZ: ${TIMEZONE}
              LOG_LEVEL: debug
              VERSION_INFORMATION: off
              # DNS options
              DNS_SERVER: on
              DNS_UPSTREAM_RESOLVER_TYPE: dot
              DNS_UPSTREAM_RESOLVERS: quad9
              DNS_CACHING: off
              DNS_UPSTREAM_IPV6: off
              # Firewall options
              FIREWALL_INPUT_PORTS: "80,1080,7878,8989,8990,9696,9999"
              FIREWALL_DEBUG: on
              # Healthcheck options
              HEALTH_SERVER_ADDRESS: ":9999"
              # Storage options
              STORAGE_FILEPATH: "" # prevent memory spike and avoid I/O
              # Updater options
              UPDATER_PERIOD: 24h
            envFrom:
              - secretRef:
                  name: gluetun-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /check/
                    port: 9999
                  periodSeconds: 30
                  timeoutSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /check/
                    port: 9999
                  initialDelaySeconds: 10
                  timeoutSeconds: 10
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { add: ["NET_ADMIN", "NET_RAW"] }
              readOnlyRootFilesystem: false
              runAsNonRoot: false
              runAsUser: 0

        containers:
          sabnzbd:
            image:
              repository: ghcr.io/home-operations/sabnzbd
              tag: 4.5.5@sha256:485440a3e9209a3515c01e1c73d6088726491a292302a721d4cb9e7c6375c768
            env:
              SABNZBD__HOST_WHITELIST_ENTRIES: >-
                sabnzbd,
                sabnzbd.selfhosted,
                sabnzbd.selfhosted.svc,
                sabnzbd.selfhosted.svc.cluster,
                sabnzbd.selfhosted.svc.cluster.local,
                "sabnzbd.${CLUSTER_DOMAIN}",
              SABNZBD__PORT: &port 80
              TZ: ${TIMEZONE}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
              readiness: *probe
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

          radarr:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.1.1.10317@sha256:5e08c0eefd2770d1d29395c4f84fe5bf7dfc3a986598021306a5d8ac017a3989
            env:
              RADARR__APP__INSTANCENAME: Radarr
              RADARR__APP__THEME: dark
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
              RADARR__LOG__DBENABLED: "False"
              RADARR__LOG__LEVEL: info
              RADARR__SERVER__PORT: &port 7878
              RADARR__UPDATE__BRANCH: develop
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes-radarr
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes-radarr
            securityContext: *securityContext
#            resources:
#              requests:
#                cpu: 100m
#              limits:
#                memory: 6Gi

          sonarr:
            image:
              repository: ghcr.io/home-operations/sonarr
              tag: 4.0.16.2946@sha256:3597fd572f4599c67abbeb8afd3cb85bce8a9e389f0779b7ea1273781544d15c
            env:
              SONARR__APP__INSTANCENAME: Sonarr
              SONARR__APP__THEME: dark
              SONARR__AUTH__METHOD: External
              SONARR__AUTH__REQUIRED: DisabledForLocalAddresses
              SONARR__LOG__DBENABLED: "False"
              SONARR__LOG__LEVEL: info
              SONARR__SERVER__PORT: &port 8989
              SONARR__UPDATE__BRANCH: develop
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes-sonarr
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes-sonarr
            securityContext: *securityContext
#            resources:
#              requests:
#                cpu: 100m
#              limits:
#                memory: 6Gi

    route:
      sabnzbd:
        hostnames: ["sabnzbd.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: arrs-sabnzbd
                port: 80
      radarr:
        hostnames: ["radarr.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: arrs-radarr
                port: 7878
      sonarr:
        hostnames: ["sonarr.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: arrs-sonarr
                port: 8989
    service:
      sabnzbd:
        controller: arrs
        ports:
          sabnzbd:
            port: 80
      radarr:
        controller: arrs
        ports:
          radarr:
            port: 7878
      sonarr:
        controller: arrs
        ports:
          sonarr:
            port: 8989
    persistence:
      config:
        existingClaim: arrs-config
        advancedMounts:
          arrs:
            sabnzbd:
              - path: "/config"
                subPath: "sabnzbd-config"
            sonarr:
              - path: "/config"
                subPath: "sonarr-config"
            radarr:
              - path: "/config"
                subPath: "radarr-config"
      downloads:
        existingClaim: arrs-downloads
        advancedMounts:
          arrs:
            sabnzbd:
              - path: "/downloads"
                subPath: ""
            sonarr:
              - path: "/downloads"
                subPath: ""
            radarr:
              - path: "/downloads"
                subPath: ""
      media:
        existingClaim: media-nfs
        advancedMounts:
          arrs:
            radarr:
              - path: "/filme"
                subPath: filme
            sonarr:
              - path: "/serien"
                subPath: serien
      logs:
        type: emptyDir
        advancedMounts:
          arrs:
            sabnzbd:
              - path: /config/logs
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 10Mi
        globalMounts:
          - path: /run
          - path: /var/run