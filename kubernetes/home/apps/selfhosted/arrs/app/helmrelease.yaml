---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arrs
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: arrs
  values:
    controllers:
      arrs:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          sabnzbd:
            image:
              repository: ghcr.io/home-operations/sabnzbd
              tag: 4.5.5@sha256:da57e01cdebc547852b6df85c8df8c0e4d87792742c7608c5590dc653b184e8c
            env:
              SABNZBD__HOST_WHITELIST_ENTRIES: >-
                sabnzbd,
                sabnzbd.selfhosted,
                sabnzbd.selfhosted.svc,
                sabnzbd.selfhosted.svc.cluster,
                sabnzbd.selfhosted.svc.cluster.local,
                "sabnzbd.${CLUSTER_DOMAIN}",
              SABNZBD__PORT: &port 80
              TZ: ${TIMEZONE}
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
              readiness: *probe
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: false
          radarr:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.0.4.10291@sha256:73fbdba72dcde5fec16264e63a9daba7829b5c2806a75615463a67117b100de3
            env:
              RADARR__APP__INSTANCENAME: Radarr
              RADARR__APP__THEME: dark
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
              RADARR__LOG__DBENABLED: "False"
              RADARR__LOG__LEVEL: info
              RADARR__SERVER__PORT: &port 7878
              RADARR__UPDATE__BRANCH: develop
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes-radarr
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 7878
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes-radarr
            securityContext: *securityContext
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 4Gi
          sonarr:
            image:
              repository: ghcr.io/home-operations/sonarr
              tag: 4.0.16.2943@sha256:0a1b8f5cb5b072f7ad8c6ff64a25dc512115d1a114ecf19a58a3b4f870207ddd
            env:
              SONARR__APP__INSTANCENAME: Sonarr
              SONARR__APP__THEME: dark
              SONARR__AUTH__METHOD: External
              SONARR__AUTH__REQUIRED: DisabledForLocalAddresses
              SONARR__LOG__DBENABLED: "False"
              SONARR__LOG__LEVEL: info
              SONARR__SERVER__PORT: 8989
              SONARR__UPDATE__BRANCH: develop
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes-sonarr
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8989
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes-sonarr
            securityContext: *securityContext
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 4Gi
        initContainers:
          gluetun:
            image:
              repository: ghcr.io/jfroy/gluetun
              tag: v3.40.3@sha256:23f4a7d62102af5e5d96401a89bc9e6911580b4d87dabb85474a732fc4ee851d
            env:
              BLOCK_MALICIOUS: off # save 300MB of RAM; https://github.com/qdm12/gluetun/issues/2054
              DOT: off
              DOT_CACHING: off
              DOT_IPV6: off
              FIREWALL_DEBUG: on
              FIREWALL_INPUT_PORTS: "80,7878,8989,9999"
              HEALTH_SERVER_ADDRESS: ":9999"
              HEALTH_SERVER_DISABLE_LOOP: on
              LOG_LEVEL: debug
              STORAGE_FILEPATH: "" # prevent memory spike and avoid I/O
              UPDATER_PERIOD: 24h
              VERSION_INFORMATION: off
              VPN_IPV6_SERVER: off
              DNS_ADDRESS: dns.mullvad.net
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: gluetun-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /check/
                    port: 9999
                  periodSeconds: 30
                  timeoutSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /check/
                    port: 9999
                  initialDelaySeconds: 10
                  timeoutSeconds: 10
            restartPolicy: Always
            securityContext:
              <<: *securityContext
              capabilities: { add: ["NET_ADMIN", "NET_RAW"] }
              readOnlyRootFilesystem: false
              runAsNonRoot: false
              runAsUser: 0
        pod:
          labels:
            gluetun: "true"
          hostname: sabnzbd
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: ${VOLSYNC_UID}
        runAsGroup: ${VOLSYNC_GID}
        fsGroup: ${VOLSYNC_GID}
        fsGroupChangePolicy: OnRootMismatch

    route:
      sabnzbd:
        hostnames: ["sabnzbd.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: arrs-sabnzbd
                port: 80
      radarr:
        hostnames: ["radarr.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: arrs-radarr
                port: 7878
      sonarr:
        hostnames: ["sonarr.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: arrs-sonarr
                port: 8989
    service:
      sabnzbd:
        controller: arrs
        ports:
          sabnzbd:
            port: 80
      radarr:
        controller: arrs
        ports:
          radarr:
            port: 7878
      sonarr:
        controller: arrs
        ports:
          sonarr:
            port: 8989
    persistence:
      config:
        existingClaim: arrs-config
        advancedMounts:
          arrs:
            sabnzbd:
              - path: "/config"
                subPath: "sabnzbd-config"
            sonarr:
              - path: "/config"
                subPath: "sonarr-config"
            radarr:
              - path: "/config"
                subPath: "radarr-config"
      downloads:
        existingClaim: arrs-downloads
        advancedMounts:
          arrs:
            sabnzbd:
              - path: "/downloads"
                subPath: ""
            sonarr:
              - path: "/downloads"
                subPath: ""
            radarr:
              - path: "/downloads"
                subPath: ""
      media:
        existingClaim: media-nfs
        advancedMounts:
          arrs:
            radarr:
              - path: "/filme"
                subPath: filme
            sonarr:
              - path: "/serien"
                subPath: serien
      logs:
        type: emptyDir
        advancedMounts:
          arrs:
            sabnzbd:
              - path: /config/logs
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 10Mi
        globalMounts:
          - path: /run
          - path: /var/run