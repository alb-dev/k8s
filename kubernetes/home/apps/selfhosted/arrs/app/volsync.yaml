---
apiVersion: v1
kind: Secret
metadata:
  name: sonarr-volsync
type: Opaque
stringData:
  RESTIC_REPOSITORY: "s3:https://${S3_DOMAIN_EXTERNAL}/homelab-sonarr"
  RESTIC_PASSWORD: ${SECRET_VOLSYNC_RESTIC_PASSWORD}
  AWS_ACCESS_KEY_ID: ${SECRET_VOLSYNC_S3_ACCESS_KEY}
  AWS_SECRET_ACCESS_KEY: ${SECRET_VOLSYNC_S3_SECRET_KEY}
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: sonarr
spec:
  sourcePVC: sonarr-config
  trigger:
    schedule: "0 * * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: sonarr-volsync
    volumeSnapshotClassName: csi-local-hostpath
    cacheCapacity: 10Gi
    cacheStorageClassName: local-hostpath
    cacheAccessModes: ["ReadWriteOnce"]
    storageClassName: local-hostpath
    accessModes: ["ReadWriteOnce"]
    moverSecurityContext:
      runAsUser: ${VOLSYNC_UID}
      runAsGroup: ${VOLSYNC_GID}
      fsGroup: ${VOLSYNC_GID}
    retain:
      hourly: 24
      daily: 7
      weekly: 5
---
