---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: oidc-arrs-radarr
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: arrs-radarr
  oidc:
    provider:
      issuer: "https://id.albdev.cloud"
    clientIDRef:
      name: "envoy-oidc-secret"
    clientSecret:
      name: "envoy-oidc-secret"
    redirectURL: "https://kopia.${CLUSTER_DOMAIN}/oauth2/callback"
    logoutPath: "/logout"
    scopes: ["openid", "profile", "email"]
