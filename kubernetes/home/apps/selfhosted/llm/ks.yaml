---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llm-ollama
spec:
  interval: 15mdependsOn:
    - name: intel-gpu-resource-driver
      namespace: kube-system
  path: ./kubernetes/home/apps/selfhosted/llm/ollama
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: ollama
      VOLSYNC_CAPACITY: 100Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  wait: false