---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless
spec:
  interval: 1h
  path: ./kubernetes/home/apps/selfhosted/paperless/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: paperless
      VOLSYNC_UID: "1000"
      VOLSYNC_GID: "65542"
      VOLSYNC_CLAIM: paperless-data
      VOLSYNC_CAPACITY: 15Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  wait: false