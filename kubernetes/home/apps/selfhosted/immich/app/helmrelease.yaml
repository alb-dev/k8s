---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1m
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    controllers:
      immich:
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.3.1
            env:
              TZ: ${TIMEZONE}
              DB_HOSTNAME: immich-postgresql
              DB_DATABASE_NAME: immich
              DB_USERNAME: immich
              DB_PASSWORD: "${SECRET_IMMICH_DB_PASSWORD}"
              REDIS_HOSTNAME: immich-valkey
              IMMICH_LOG_LEVEL: verbose
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 6G
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

      machine-learning:
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.3.1@sha256:379e31b8c75107b0af8141904baa8cc933d7454b88fdb204265ef11749d7d908
            env:
              TZ: ${TIMEZONE}
              DB_HOSTNAME: immich-postgresql
              DB_PORT: "5432"
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
              DB_DATABASE_NAME: immich
              DB_USERNAME: immich
              REDIS_HOSTNAME: immich-valkey
              REDIS_PORT: "6379"
              DB_PASSWORD: "${SECRET_IMMICH_DB_PASSWORD}"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 4G
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true

      valkey:
        containers:
          app:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.0.1
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec: &probe-exec { command: ["sh", "-c", "valkey-cli ping | grep PONG"] }
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec: *probe-exec
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec: *probe-exec
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30

      postgresql:
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/postgres
              tag: 18-vectorchord0.5.3-pgvector0.8.1
            env:
              POSTGRES_DB: immich
              POSTGRES_USER: immich
              POSTGRES_PASSWORD: ${SECRET_IMMICH_DB_PASSWORD}
              PGDATA: /var/lib/postgresql/data
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: 750m
                memory: 768Mi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
    service:
      immich:
        controller: immich
        ports:
          http:
            port: 2283
          metrics-api:
            port: 8081
          metrics-ms:
            port: 8082
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: 3003
      valkey:
        controller: valkey
        ports:
          http:
            port: 6379
      postgresql:
        controller: postgresql
        ports:
          postgresql:
            port: 5432

    route:
      immich:
        hostnames: ["photos.${CLUSTER_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: immich
                port: 2283

    persistence:
      immich:
        existingClaim: photo-nfs
        advancedMounts:
          immich:
            app:
              - path: /usr/src/app/upload

      machine-learning:
        type: emptyDir
        advancedMounts:
          machine-learning:
            app:
              - path: /cache

      postgresql:
        existingClaim: immich-postgresql-data
        advancedMounts:
          postgresql:
            app:
              - path: /var/lib/postgresql/data
                subPath: data