---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
spec:
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  interval: 15m
  path: ./kubernetes/home/apps/observability/grafana/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-instance
spec:
  dependsOn:
    - name: grafana
    - name: democratic-csi
      namespace: storage
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  interval: 15m
  path: ./kubernetes/home/apps/observability/grafana/instance
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false