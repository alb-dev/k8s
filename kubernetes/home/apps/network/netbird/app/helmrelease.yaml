---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird
spec:
  chart:
    spec:
      chart: kubernetes-operator
      version: "0.2.2"
      sourceRef:
        kind: HelmRepository
        name: netbird
        namespace: network
  interval: 5m
  values:
    netbirdAPI:
      keyFromSecret:
        name: netbird-api-token
        key: NB_API_KEY
    ingress:
      enabled: true
      router:
        enabled: true
      allowAutomaticPolicyCreation: true
    cluster:
      name: homelab-0
