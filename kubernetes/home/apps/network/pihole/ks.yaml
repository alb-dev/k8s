---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pihole
spec:
  interval: 15m
  path: ./kubernetes/home/apps/network/pihole/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: pihole
      VOLSYNC_UID: "0"
      VOLSYNC_GID: "0"
      VOLSYNC_CLAIM: pihole-data
      VOLSYNC_CAPACITY: 10Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false