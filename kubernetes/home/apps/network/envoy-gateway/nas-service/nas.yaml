---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: nas-service
  namespace: network
spec:
  endpoints:
    - ip:
        address: "${SECRET_MEDIA_SERVER}"
        port: 5001
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nas-service
spec:
  hostnames: ["nas.${CLUSTER_DOMAIN}"]
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: nas-service
      matches:
        - path:
            type: PathPrefix
            value: /