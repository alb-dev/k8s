---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: onji
spec:
  secretName: int-onji-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: int.onji.space
  dnsNames:
    - int.onji.space
    - "*.int.onji.space"
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: int-onji-vpn
spec:
  secretName: int-onji-vpn-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: vpn.onji.space
  dnsNames:
    - vpn.onji.space
    - "*.vpn.onji.space"
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always