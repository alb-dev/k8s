---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: int-onji-tls
spec:
  secretName: int-onji-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: int.onji.space
  dnsNames:
    - int.onji.space
    - "*.int.onji.space"
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ext-onji-vpn-tls
spec:
  secretName: ext-onji-vpn-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: ext.onji.space
  dnsNames:
    - ext.onji.space
    - "*.ext.onji.space"
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always
