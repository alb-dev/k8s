---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zigbee2mqtt
spec:
  interval: 1h
  commonMetadata:
    labels:
      app.kubernetes.io/name: zigbee2mqtt
  path: ./kubernetes/home/apps/home-automation/zigbee2mqtt/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: zigbee2mqtt
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_CLAIM: zigbee2mqtt-data
      VOLSYNC_GID: "1000"
      VOLSYNC_UID: "1000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-automation
  wait: false