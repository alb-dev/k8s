---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
spec:
  interval: 1h
  timeout: 5m
  commonMetadata:
    labels:
      app.kubernetes.io/name: home-assistant
  path: "./kubernetes/home/apps/home-automation/home-assistant/app"
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: home-assistant
      VOLSYNC_CAPACITY: 8Gi
      VOLSYNC_CLAIM: home-assistant
      VOLSYNC_GID: "65534"
      VOLSYNC_UID: "65533"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-automation
  wait: false