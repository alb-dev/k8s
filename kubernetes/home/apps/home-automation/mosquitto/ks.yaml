---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mosquitto
spec:
  interval: 15m
  commonMetadata:
    labels:
      app.kubernetes.io/name: mosquitto
  path: ./kubernetes/home/apps/home-automation/mosquitto/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: mosquitto
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_CLAIM: mosquitto-data
      VOLSYNC_GID: "2000"
      VOLSYNC_UID: "2000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-automation
  wait: false