---
helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://ghcr.io/home-operations/charts-mirror/cilium
    version: 1.18.4
    values:
      - templates/values.yaml.gotmpl
    hooks:
      # Wait for Cilium CRDs to be available
      - command: bash
        args:
          - -c
          - until kubectl get crd ciliumloadbalancerippools.cilium.io ciliumbgpadvertisements.cilium.io ciliumbgppeerconfigs.cilium.io ciliumbgpclusterconfigs.cilium.io &>/dev/null; do sleep 5; done
        events:
          - postsync
        showlogs: true

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.19.1
    values:
      - ./templates/values.yaml.gotmpl
    set:
      - name: crds.enabled
        value: "true"
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - ../../../kubernetes/home/apps/cert-manager/cert-manager/app/cluster-issuers.yaml

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.33.0
    set:
      - name: crds.enabled
        value: "true"
    values: ['./templates/values.yaml.gotmpl']
    needs:
      - kube-system/cilium
      
  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.33.0
    values: ['./templates/values.yaml.gotmpl']
    needs: ['flux-system/flux-operator']