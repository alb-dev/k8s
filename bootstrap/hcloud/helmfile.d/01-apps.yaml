---
helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

repositories:
  - name: traefik
    url: https://traefik.github.io/charts

releases:
  - name: openebs
    namespace: storage
    chart: openebs/openebs
    version: 4.3.3
    values:
      - ./templates/values.yaml.gotmpl

  - name: forgejo
    namespace: development
    chart: oci://code.forgejo.org/forgejo-helm/forgejo
    version: 16.0.1
    values:
      - ./templates/values.yaml.gotmpl
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - ../../../kubernetes/hcloud/apps/development/forgejo/app/resources/bot-config.yaml
      - events: ["presync"]
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - ../../../kubernetes/hcloud/apps/development/forgejo/app/pvc.yaml
#      - events: ["postsync"]
#        showlogs: true
#        command: kubectl
#        args:
#          - apply
#          - -f
#          - cluster.secrets.yaml
  - name: traefik
    namespace: network
    chart: traefik/traefik
    version: 38.0.2
    values:
      - ./templates/values.yaml.gotmpl
    set:
      - name: crds.enabled
        value: "true"
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - ../../../kubernetes/hcloud/apps/network/traefik/app/middlewares.yaml

  #- name: system-upgrade-controller
  #  namespace: system-upgrade
  #  chart: oci://ghcr.io/bjw-s-labs/helm/app-template
  #  version: 4.3.0
  #  values:
  #    - ./templates/values.yaml.gotmpl
 
  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.19.2
    values:
      - ./templates/values.yaml.gotmpl
    set:
      - name: crds.enabled
        value: "true"
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - ../../../kubernetes/hcloud/apps/cert-manager/cert-manager/app/cluster-issuers.yaml

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.38.1
    set:
      - name: crds.enabled
        value: "true"
    values: ['./templates/values.yaml.gotmpl']
    needs: ['cert-manager/cert-manager']

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.39.0
    values: ['./templates/values.yaml.gotmpl']
    needs: ['flux-system/flux-operator']